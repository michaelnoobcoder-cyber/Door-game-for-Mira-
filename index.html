<!DOCTYPE html>
<html>
<head>
<title>Door Game</title>
<style>
body{
margin:0;
background:black;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

#game{
position:relative;
}

#door{
width:800px;
cursor:pointer;
}

#cat{
position:absolute;
width:60px;
bottom:60px;
right:120px;
opacity:0;
cursor:pointer;
}

</style>
</head>

<body>

<div id="game">

<img id="door" src="https://i.imgur.com/Gy6YV7P.png">

<img id="cat" src="https://i.imgur.com/1Xq9BiP.png">

</div>

<script>

const door = document.getElementById("door")
const cat = document.getElementById("cat")

let catFound = false

door.onclick = () => {

if(catFound){

alert("The door opens... Welcome to the next stage")

}
else{

alert("Hmm... something is missing")

}

}

cat.onclick = () => {

catFound = true
cat.style.opacity = 1
alert("You found the cat!")

}

</script>

</body>
</html>
